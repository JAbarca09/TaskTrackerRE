<body>
    <div class="container-fluid bgPhoto">
        <div class="row mt-4">
            <div class="col-2">
                <!-- <button id="addTaskBtn" type="button" class="btn btn-primary">Add Task</button> -->
                <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                    data-bs-target="#staticBackdrop">Add Task</button>
                <!--Modal-->
                <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false"
                    tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="staticBackdropLabel">Task Info</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <!--Modal body inside here!-->
                                <div class="row">
                                    <div class="col-4 d-flex justify-content-end">
                                        <h5 class="paddingTopModal">Name:</h5>
                                    </div>
                                    <div class="col-8 d-flex justify-content-start">
                                        <input type="text" class="form-control" id="inputTaskName"
                                            aria-describedby="TaskName">
                                    </div>
                                </div>
                                <div class="row mt-1">
                                    <div class="col-4 d-flex justify-content-end">
                                        <h5 class="paddingTopModal">Description:</h5>
                                    </div>
                                    <div class="col-8 d-flex justify-content-start">
                                        <input type="text" class="form-control" id="inputDescription"
                                            aria-describedby="Description">
                                    </div>
                                </div>
                                <div class="row mt-1">
                                    <div class="col-4 d-flex justify-content-end">
                                        <h5 class="paddingTopModal">Priority:</h5>
                                    </div>
                                    <div class="col-8 d-flex justify-content-start">
                                        <!-- <input type="text" class="form-control" id="inputDescription" aria-describedby="Description"> -->
                                        <select id="priority" class="form-select" aria-label="Default select example">
                                            <option selected>Open this select menu</option>
                                            <option value="1">Low</option>
                                            <option value="2">Medium</option>
                                            <option value="3">High</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-1">
                                    <div class="col-4 d-flex justify-content-end">
                                        <h5 class="paddingTopModal">Condition:</h5>
                                    </div>
                                    <div class="col-8 d-flex justify-content-start">
                                        <!-- <input type="text" class="form-control" id="inputDescription" aria-describedby="Description"> -->
                                        <select class="form-select" aria-label="Default select example">
                                            <option selected>Open this select menu</option>
                                            <option value="1">To-Do</option>
                                            <option value="2">In Progress</option>
                                            <option value="3">Completed</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-1">
                                    <div class="col-4 d-flex justify-content-end">
                                        <h5 class="paddingTopModal">Due Date:</h5>
                                    </div>
                                    <div class="col-8 d-flex justify-content-start">
                                        <input type="date" id="dueDate" name="dueDate">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                                <button type="button" id="saveTaskBtn" class="btn btn-primary">Save Task</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!--Modal ends-->
            </div>
            <div class="col-8 text-center">
                <h1>Task Tracker</h1>
            </div>
            <div class="col-2"></div>
        </div>
        <div class="row justify-content-center">
            <div class="col-1 d-flex justify-content-end">
